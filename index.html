<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management System</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <header>
        <h1>Internship Management System</h1>
    </header>

    <div class="container">

        <div class="stats">
            <div class="stat-box">
                <h3 id="totalInternships">0</h3>
                <p>Total Applications</p>
            </div>
        </div>

        <div class="card">
            <h2>Add Internship Application</h2>

            <input type="text" id="studentName" placeholder="Student Name">

            <input type="text" id="regNo" placeholder="Registration Number">

            <input type="date" id="startDate" placeholder="Start Date">

            <input type="date" id="endDate" placeholder="End Date">

            <input type="text" id="department" placeholder="Department">

            <input type="text" id="companyName" placeholder="Company Name">

            <input type="text" id="role" placeholder="Internship Role">

            <select id="status">
                <option value="">Select Status</option>
                <option value="Not Applied">Not Applied</option>
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Selected">Selected</option>
                <option value="Rejected">Rejected</option>
            </select>

            <button onclick="addInternship()">Add Application</button>
        </div>

        <div class="card">
            <h2>Internship Records</h2>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Registration No</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Department</th>
                            <th>Company</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody id="internshipTable"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

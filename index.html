<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Management System</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>

    <header>
        <h1>Internship Management System</h1>
    </header>

    <div class="container">

        <div class="stats">
            <div class="stat-box">
                <h3 id="totalInternships">0</h3>
                <p>Total Applications</p>
            </div>
        </div>

        <div class="card">
            <h2>Add Internship Application</h2>

            <input type="text" id="studentName" placeholder="Student Name">

            <input type="date" id="stardDate" placeholder="Start Date">

            <input type="date" id="endDate" placeholder="End Date">

            <input type="text" id="department" placeholder="Department">

            <input type="text" id="companyName" placeholder="Company Name">

            <input type="text" id="role" placeholder="Internship Role">

            <select id="status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Selected">Selected</option>
                <option value="Rejected">Rejected</option>
            </select>

            <button onclick="addInternship()">Add Application</button>
        </div>

        <div class="card">
            <h2>Internship Records</h2>

            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Department</th>
                        <th>Company</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="internshipTable"></tbody>
            </table>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
